<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#050508" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureQuiz — Teacher Dashboard</title>
  <meta name="description" content="Monitor quiz submissions and integrity events in real time." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="cursor"></div>

  <main class="dashboard-page">
    <section class="screen active">
      <div class="screen-inner" style="justify-content:flex-start;padding-top:2.5rem;padding-bottom:2.5rem;">
        <div class="hero" style="margin-top:0;">
          <div class="hero-eyebrow">Teacher Analytics</div>
          <h1 style="font-size:clamp(2.2rem,5vw,4rem);">Dashboard</h1>
          <p id="dash-subtitle">Loading quiz details...</p>
        </div>

        <div class="card" style="max-width:1100px;">
          <div class="dashboard-meta">
            <div class="dashboard-meta-item">
              <span class="meta-label">Quiz ID</span>
              <strong id="quiz-id">--</strong>
            </div>
            <div class="dashboard-meta-item">
              <span class="meta-label">Quiz Title</span>
              <strong id="quiz-title">--</strong>
            </div>
            <div class="dashboard-meta-item">
              <span class="meta-label">Submissions</span>
              <strong id="sub-count">0</strong>
            </div>
          </div>

          <div id="dash-error" class="error-msg hidden"></div>

          <div class="dashboard-table-wrap">
            <table class="dashboard-table" aria-label="Quiz submissions table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Score</th>
                  <th>Submitted At</th>
                  <th>Integrity</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="submission-rows">
                <tr>
                  <td colspan="5" class="dashboard-empty">No submissions yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="background.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
